            <div class="col-md-6 col-12">

            <div class="col-md-6 col-12">
              <div class="d-flex align-items-center gap-2">
                <input type="text" class="form-control" placeholder="Doğrulama Kodu *" />

                <i class="fa-solid fa-rotate-right refresh-icon"></i>
              </div>

            <!-- checkboxlar -->

              <div class="form-check custom-checkbox">

                <label

            <div class="col-12">

                <input class="form-check-input" type="checkbox" id="kvkkCheck3" />
